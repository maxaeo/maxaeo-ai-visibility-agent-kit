name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check shell scripts
        run: |
          bash -n install.sh
          bash -n claude/install.sh
          bash -n codex/install.sh
      - name: Check JSON metadata
        run: python3 -m json.tool metadata/directory-submission.json >/dev/null
      - name: Check required docs
        run: |
          test -f README.md
          test -f README.zh-CN.md
          test -f CHANGELOG.md
          test -f install.sh
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f claude/commands/maxaeo.md
          test -f docs/codex-setup.md
          test -f docs/claude-setup.md
          test -f docs/ai-visibility-audit-examples.md
          test -f docs/local-audit-vs-maxaeo.md
          test -f docs/distribution-checklist.md
          test -f examples/healthy-foundation.md
          test -f examples/healthy-foundation.zh-CN.md
          test -f examples/full-ai-visibility-report.md
          test -f examples/quick-audit.zh-CN.md
          test -f shared/references/commands.md
      - name: Check unfinished markers
        run: |
          ! grep -R -n -E 'TODO|FIXME|placeholder' README.md README.zh-CN.md claude codex cursor docs mcp shared examples metadata
